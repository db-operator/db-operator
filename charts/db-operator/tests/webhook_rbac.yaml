---
suite: Test RBAC templating for the webhook
templates:
  - webhook/cluster_role.yaml
  - webhook/cluster_role_binding.yaml
  - webhook/_helpers.tpl
  - _helpers.tpl
tests:
  - it: ClusterRole should be rendered by default
    template: webhook/cluster_role.yaml
    asserts:
      - hasDocuments:
          count: 1
  - it: When disabled, RBAC shouldn't be rendered at all
    template: webhook/cluster_role.yaml
    set:
      webhook:
        rbac:
          create: false
    asserts:
      - hasDocuments:
          count: 0
  - it: ClusterRoleBinding should be rendered by default
    template: webhook/cluster_role_binding.yaml
    asserts:
      - hasDocuments:
          count: 1
  - it: When disabled, RBAC shouldn't be rendered at all
    template: webhook/cluster_role_binding.yaml
    set:
      webhook:
        rbac:
          create: false
    asserts:
      - hasDocuments:
          count: 0
