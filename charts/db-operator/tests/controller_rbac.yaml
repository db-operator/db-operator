---
suite: Test RBAC templating for the controller
templates:
  - controller/cluster_role.yaml
  - controller/cluster_role_binding.yaml
  - controller/_helpers.tpl
  - _helpers.tpl
tests:
  - it: ClusterRole should be rendered by default
    template: controller/cluster_role.yaml
    asserts:
      - hasDocuments:
          count: 1
  - it: When disabled, RBAC shouldn't be rendered at all
    template: controller/cluster_role.yaml
    set:
      controller:
        rbac:
          create: false
    asserts:
      - hasDocuments:
          count: 0
  - it: ClusterRoleBinding should be rendered by default
    template: controller/cluster_role_binding.yaml
    asserts:
      - hasDocuments:
          count: 1
  - it: When disabled, RBAC shouldn't be rendered at all
    template: controller/cluster_role_binding.yaml
    set:
      controller:
        rbac:
          create: false
    asserts:
      - hasDocuments:
          count: 0
