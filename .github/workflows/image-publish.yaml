name: Publish a container image

on:
  push:
  release:
    types: [published, edited]

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set the image metadata
        run: ./build/set_image_metadata

      - name: Set the operator version from the tag
        if: (github.event_name == 'release' && (github.event.action == 'published' || github.event.action == 'edited'))
        run: |-
          echo OPERATOR_VERSION=${{ github.event.release.tag_name }} >> "$GITHUB_ENV"

      - name: Set the operator version from the tag
        if: github.event_name == 'push'
        run: |-
          echo OPERATOR_VERSION=${{ github.sha }} >> "$GITHUB_ENV"

      - name: Build an image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: db-operator-dev
          tags: ${{ env.TAGS }}
          platforms: linux/amd64, linux/arm64/v8
          build-args: |
            OPERATOR_VERSION=${{ env.OPERATOR_VERSION }}
          containerfiles: |
            ./Containerfile
          labels: ${{ env.ANNOTATIONS }}

      - name: Push the image to GHCR
        id: push-to-ghcr
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ghcr.io/${{ github.repository_owner }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set the version tag (only if released)
        id: retag-version
        if: (github.event_name == 'release' && (github.event.action == 'published' || github.event.action == 'edited'))
        run: |
          buildah tag \
          ${{ steps.build-image.outputs.image }}:${{ github.sha }} \
          ghcr.io/${{ github.repository_owner }}/db-operator:latest
          buildah tag \
          ${{ steps.build-image.outputs.image }}:${{ github.sha }} \
          ghcr.io/${{ github.repository_owner }}/db-operator:${{ github.event.release.tag_name }}

      - name: Push the release image to GHCR
        if: (github.event_name == 'release' && (github.event.action == 'published' || github.event.action == 'edited'))
        id: push-release
        uses: redhat-actions/push-to-registry@v2
        with:
          tags: ghcr.io/${{ github.repository_owner }}/db-operator:latest ghcr.io/${{ github.repository_owner }}/db-operator:${{ github.event.release.tag_name }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: sigstore/cosign-installer@v4.1.0

      - uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability dev image scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ steps.push-to-ghcr.outputs.registry-path }}"
          scan-type: image
          format: "cosign-vuln"
          exit-code: "1"
          ignore-unfixed: false
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          output: ./dev-report.json

      - name: Sign the dev image with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.push-to-ghcr.outputs.digest }}
          IMAGE: ${{ steps.push-to-ghcr.outputs.registry-path }}
        run: |
          cosign sign --yes ${IMAGE}@${DIGEST}
          cosign attest --type vuln --predicate dev-report.json ${IMAGE}@${DIGEST}

      - name: Sign the release images with GitHub OIDC Token
        if: (github.event_name == 'release' && (github.event.action == 'published' || github.event.action == 'edited'))
        env:
          DIGEST: ${{ steps.push-release.outputs.digest }}
          IMAGE: ${{ steps.push-release.outputs.registry-path }}
        run: |
          cosign sign --yes ${IMAGE}@${DIGEST}
