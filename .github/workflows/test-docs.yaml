name: Documentation test
on:
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - uses: abatilo/actions-poetry@v4
      - run: poetry -C documentation install --no-root
      - run: poetry -C documentation run zensical build --clean
