---
apiVersion: v1
kind: Pod
metadata:
  name: tester 
  namespace: db-operator-e2e
spec:
  containers:
  - name: mysql-writer
    image: mysql
    command:
      - sh
      - -c
      - exec sh /app/test_write.sh
    env:
      - name: MYSQL_PASSWORD_FILE
        value: /run/secrets/mysql/PASSWORD
      - name: MYSQL_USERNAME
        valueFrom:
          secretKeyRef:
            name: mysql-creds 
            key: USER
      - name: MYSQL_DB
        valueFrom:
          secretKeyRef:
            name: mysql-creds 
            key: DB
      - name: MYSQL_HOST
        valueFrom:
          configMapKeyRef:
            name: mysql-creds 
            key: DB_CONN
    volumeMounts:
      - name: db-secret
        mountPath: /run/secrets/mysql/
        readOnly: true
      - name: script
        mountPath: /app/
      - name: shared-data
        mountPath: /tmp
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
  - name: mysql-reader
    image: mysql
    command:
      - sh
      - -c
      - exec sh /app/test_read.sh
    env:
      - name: MYSQL_PASSWORD_FILE
        value: /run/secrets/mysql/PASSWORD
      - name: MYSQL_USERNAME
        valueFrom:
          secretKeyRef:
            name: mysql-creds 
            key: USER
      - name: MYSQL_DB
        valueFrom:
          secretKeyRef:
            name: mysql-creds 
            key: DB
      - name: MYSQL_HOST
        valueFrom:
          configMapKeyRef:
            name: mysql-creds 
            key: DB_CONN
    volumeMounts:
      - name: db-secret
        mountPath: /run/secrets/mysql/
        readOnly: true
      - name: script
        mountPath: /app/
      - name: shared-data
        mountPath: /tmp
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
  restartPolicy: Never
  volumes:
    - name: db-secret
      secret:
        secretName: mysql-creds 
    - name: script
      configMap:
        name: scripts
    - name: shared-data
      emptyDir: {}
