---
apiVersion: v1
kind: Pod
metadata:
  name: tester
  namespace: db-operator-e2e
spec:
  initContainers:
  - name: postgres-writer
    image: postgres
    command:
      - sh
      - -c
      - exec sh /app/test_write.sh
    env:
      - name: POSTGRES_PASSWORD_FILE
        value: /run/secrets/postgres/POSTGRES_PASSWORD
      - name: POSTGRES_USERNAME
        valueFrom:
          secretKeyRef:
            name: postgres-creds 
            key: POSTGRES_USER
      - name: POSTGRES_DB
        valueFrom:
          secretKeyRef:
            name: postgres-creds 
            key: POSTGRES_DB
      - name: POSTGRES_HOST
        valueFrom:
          configMapKeyRef:
            name: postgres-creds 
            key: DB_CONN
    volumeMounts:
      - name: db-secret
        mountPath: /run/secrets/postgres/
        readOnly: true
      - name: script
        mountPath: /app/
      - name: shared-data
        mountPath: /tmp
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
  containers:
  - name: postgres-reader
    image: postgres
    command:
      - sh
      - -c
      - exec sh /app/test_read.sh
    env:
      - name: POSTGRES_PASSWORD_FILE
        value: /run/secrets/postgres/POSTGRES_PASSWORD
      - name: POSTGRES_USERNAME
        valueFrom:
          secretKeyRef:
            name: postgres-creds 
            key: POSTGRES_USER
      - name: POSTGRES_DB
        valueFrom:
          secretKeyRef:
            name: postgres-creds 
            key: POSTGRES_DB
      - name: POSTGRES_HOST
        valueFrom:
          configMapKeyRef:
            name: postgres-creds 
            key: DB_CONN
    volumeMounts:
      - name: db-secret
        mountPath: /run/secrets/postgres/
        readOnly: true
      - name: script
        mountPath: /app/
      - name: shared-data
        mountPath: /tmp
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
  restartPolicy: Never
  volumes:
    - name: db-secret
      secret:
        secretName: postgres-creds 
    - name: script
      configMap:
        name: scripts 
    - name: shared-data
      emptyDir: {}
