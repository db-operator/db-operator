apiVersion: v1
kind: Secret
metadata:
  name:  {{ template "db-operator-mysql-test.name" . }}-mysql-admin-password
  labels:
    {{- include "db-operator-mysql-test.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.mysql.admin.password | b64enc }}
  user: {{ .Values.mysql.admin.user | b64enc }}

