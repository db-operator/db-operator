---
apiVersion: v1
kind: Secret
metadata:
  name:  {{ template "db-operator-psql-test.name" . }}-postgresql-admin-password
  labels:
    {{- include "db-operator-psql-test.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.postgresql.admin.password | b64enc }}
  user: {{ .Values.postgresql.admin.user | b64enc }}
