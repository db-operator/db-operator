---
apiVersion: v1
kind: Pod
metadata:
  name: {{ template "db-operator-psql-test.name" . }}-tester-app-{{ randAlphaNum 5 | lower }}
  labels:
    {{- include "db-operator-psql-test.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    {{- if .Values.cleanup }}
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- end }}
    "helm.sh/hook-weight": "5"
spec:
  containers:
  - name: postgres-writer
    image: postgres
    command:
      - sh
      - -c
      - exec sh /app/write.sh
    env:
      - name: POSTGRES_PASSWORD_FILE
        value: /run/secrets/postgres/POSTGRES_PASSWORD
      - name: POSTGRES_USERNAME
        valueFrom:
          secretKeyRef:
            name: {{ template "db-operator-psql-test.name" . }}-postgresql-credentials
            key: POSTGRES_USER
      - name: POSTGRES_DB
        valueFrom:
          secretKeyRef:
            name: {{ template "db-operator-psql-test.name" . }}-postgresql-credentials
            key: POSTGRES_DB
      - name: POSTGRES_HOST
        valueFrom:
          configMapKeyRef:
            name: {{ template "db-operator-psql-test.name" . }}-postgresql-credentials
            key: DB_CONN
    volumeMounts:
      - name: db-secret
        mountPath: /run/secrets/postgres/
        readOnly: true
      - name: script
        mountPath: /app/
      - name: shared-data
        mountPath: /tmp
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
  - name: postgres-reader
    image: postgres
    command:
      - sh
      - -c
      - exec sh /app/read.sh
    env:
      - name: POSTGRES_PASSWORD_FILE
        value: /run/secrets/postgres/POSTGRES_PASSWORD
      - name: POSTGRES_USERNAME
        valueFrom:
          secretKeyRef:
            name: {{ template "db-operator-psql-test.name" . }}-postgresql-credentials
            key: POSTGRES_USER
      - name: POSTGRES_DB
        valueFrom:
          secretKeyRef:
            name: {{ template "db-operator-psql-test.name" . }}-postgresql-credentials
            key: POSTGRES_DB
      - name: POSTGRES_HOST
        valueFrom:
          configMapKeyRef:
            name: {{ template "db-operator-psql-test.name" . }}-postgresql-credentials
            key: DB_CONN
    volumeMounts:
      - name: db-secret
        mountPath: /run/secrets/postgres/
        readOnly: true
      - name: script
        mountPath: /app/
      - name: shared-data
        mountPath: /tmp
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
  restartPolicy: Never
  volumes:
    - name: db-secret
      secret:
        {{- if .Values.features.existingUser.enabled }}
        secretName:  {{ template "db-operator-psql-test.name" . }}-existing-user-password
        {{- else }}
        secretName: {{ template "db-operator-psql-test.name" . }}-postgresql-credentials
        {{- end }}
    - name: script
      configMap:
        name: {{ template "db-operator-psql-test.name" . }}-postgresql-test-script
    - name: shared-data
      emptyDir: {}

