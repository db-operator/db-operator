---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "db-operator.webhook.name" . }}
  labels:
    {{- include "db-operator.webhook.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "kubectl-helper.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
