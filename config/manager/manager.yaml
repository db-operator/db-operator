# Preserve after regen
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: db-operator
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: controller-config
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: db-operator
    app.kubernetes.io/managed-by: kustomize
data:
  config.yaml: |
    instance:
      generic: {}
    backup:
      activeDeadlineSeconds: 60
      nodeSelector: {}
      postgres:
        image: ghcr.io/db-operator/pgdump-rclone:latest
      mysql:
        image: ghcr.io/db-operator/mydump-rclone:latest
      resources: {}
    monitoring: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: db-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: db-operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: db-operator
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
          - db-operator
        args:
          - --health-probe-bind-address=:8081
        image: localhost/controller:latest
        imagePullPolicy: Never
        name: manager
        ports: []
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
          - mountPath: /run/config/
            name: config-volume
            readOnly: true
        env:
          - name: OPERATOR_NAME
            value: "db-operator"
          - name: WATCH_NAMESPACE
            value: ""
          - name: RECONCILE_INTERVAL
            value: "30"
          - name: POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
          - name: CONFIG_PATH
            value: "/run/config/config.yaml"
      volumes:
        - name: config-volume
          configMap:
            name: controller-config
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
